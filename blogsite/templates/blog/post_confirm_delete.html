{% extends 'base.html' %}

{% block content %}
<div class="alert alert-danger mt-4" role="alert">
    <h4 class="alert-heading">Are you sure?</h4>
    <p>You are about to delete the post: <strong>"{{ post.title }}"</strong>. This action cannot be undone.</p>
    <hr>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete Post</button>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
