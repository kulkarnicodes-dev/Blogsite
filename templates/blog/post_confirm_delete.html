{% extends 'base.html' %}
{% block content %}
<div class="delete-wrapper d-flex align-items-center justify-content-center">
    <div class="card delete-card shadow-lg mx-auto">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="delete-icon mb-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h2 class="fw-bold mb-1">Delete this post?</h2>
                <p class="text-muted mb-0">This action is permanent and cannot be undone.</p>
            </div>

            <div class="post-preview mb-4">
                <p class="mb-0 small text-uppercase text-muted fw-semibold" style="letter-spacing: 0.05em;">Post title</p>
                <p class="mb-0 fw-semibold">"{{ post.title }}"</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <a href="{% url 'post_detail' post.pk %}" class="btn btn-cancel w-50 py-2 fw-semibold">
                        Cancel
                    </a>
                    <button type="submit" class="btn btn-delete w-50 py-2 fw-semibold">
                        Yes, Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .delete-wrapper {
        min-height: 80vh;
        padding: 2rem 1rem;
    }

    .delete-card {
        max-width: 440px;
        width: 100%;
        border: none;
        border-radius: 16px;
        overflow: hidden;
    }

    .delete-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto;
        background: linear-gradient(135deg, #ff5c5c, #ff8c4f);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 1.75rem;
    }

    .post-preview {
        background: #fbf4f4;
        border: 1px solid #f3d9d9;
        border-radius: 10px;
        padding: 0.85rem 1rem;
    }

    .delete-card .btn-cancel {
        background: #f1f2f5;
        border: none;
        border-radius: 8px;
        color: #4a4f5a;
        transition: background 0.15s ease;
    }

    .delete-card .btn-cancel:hover {
        background: #e4e6ea;
        color: #2c2f36;
    }

    .delete-card .btn-delete {
        background: linear-gradient(135deg, #ff5c5c, #ff3838);
        border: none;
        border-radius: 8px;
        color: #fff;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .delete-card .btn-delete:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(255, 56, 56, 0.35);
        color: #fff;
    }
</style>
{% endblock %}
